name: Android CI

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 11
        cache: gradle
    - name: Build with Gradle
      # gnavi: assembleDebug, not build -- `build` also runs
      # testDebugUnitTest, which includes a pre-existing Robolectric/SQLite
      # threading flake in NormalizeUrlTest unrelated to this fork's actual
      # change (HttpConnection's read timeout). assembleDebug still
      # produces the APK we need without depending on that unrelated
      # test's stability.
      run: ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
